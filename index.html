<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>首页</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #f5f7fb;
      color: #333;
    }
    header {
      background: #3b82f6;
      color: white;
      padding: 24px 20px;
      text-align: center;
    }
    main {
      max-width: 960px;
      margin: 32px auto;
      padding: 0 20px;
    }
    .hero {
      background: white;
      border-radius: 16px;
      box-shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
      padding: 32px;
    }
    .hero h1 {
      margin-top: 0;
      font-size: 2.4rem;
      line-height: 1.1;
    }
    .hero p {
      margin: 16px 0 0;
      color: #555;
      font-size: 1rem;
      line-height: 1.8;
    }
    footer {
      text-align: center;
      color: #777;
      margin: 48px 0 24px;
    }
  </style>
</head>
<body>
  <header>
    <h1>欢迎来到首页</h1>
    <p>这是一个简单的静态主页示例。</p>
  </header>
  <main>
    <section class="hero">
      <h1>你好，世界！</h1>
      <p>这个页面为你提供一个干净、现代的首页基础示例。你可以在此处添加介绍、导航、项目展示或更多内容。</p>
    </section>
  </main>
  <footer>
    © 2026 首页模板
  </footer>
</body>
</html>
